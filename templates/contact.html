<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 40px;
    }

    .card {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #1f3c88;
    }

    p {
      color: #555;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d0d7e2;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      margin-top: 18px;
      background: #1f3c88;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Contactez-moi</h1>
    <p>Laissez votre nom, prénom et un message.</p>

    <form>
      <div class="row">
        <div>
          <label for="nom">Nom</label>
          <input id="nom" type="text" placeholder="Votre nom">
        </div>
        <div>
          <label for="prenom">Prénom</label>
          <input id="prenom" type="text" placeholder="Votre prénom">
        </div>
      </div>

      <label for="message">Message</label>
      <textarea id="message" placeholder="Écrivez votre message ici..."></textarea>

      <button type="submit">Envoyer</button>
    </form>
  </div>
</body>
</html>
