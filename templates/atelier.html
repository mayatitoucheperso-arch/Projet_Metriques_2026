<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atelier — Humidité à Versailles</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f9fc;
    }

    .card {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #234;
    }

    p {
      color: #555;
    }

    #chart {
      width: 100%;
      height: 560px;
    }

    #status {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Humidité à Versailles — Répartition sur 24h</h1>
    <p>Visualisation en camembert à partir de l’API Open-Meteo.</p>
    <div id="chart"></div>
    <div id="status"></div>
  </div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      try {
        const rows = await fetchData();
        drawChart(rows);
      } catch (err) {
        document.getElementById('status').textContent = "Erreur : " + (err?.message || err);
        console.error(err);
      }
    }

    async function fetchData() {
      const res = await fetch('/versailles', {
        headers: { 'Accept': 'application/json' }
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status} sur /versailles`);
      }

      const json = await res.json();

      const first24 = json.slice(0, 24);

      let faible = 0;
      let moyenne = 0;
      let forte = 0;

      first24.forEach(p => {
        const h = Number(p.humidite);

        if (h < 40) {
          faible++;
        } else if (h < 70) {
          moyenne++;
        } else {
          forte++;
        }
      });

      return [
        ['Niveau', 'Nombre d’heures'],
        ['Faible (< 40%)', faible],
        ['Moyenne (40% à 69%)', moyenne],
        ['Forte (≥ 70%)', forte]
      ];
    }

    function drawChart(rows) {
      const data = google.visualization.arrayToDataTable(rows);

      const options = {
        title: 'Répartition de l’humidité sur les prochaines 24h',
        pieHole: 0.25
      };

      const chart = new google.visualization.PieChart(document.getElementById('chart'));
      chart.draw(data, options);

      document.getElementById('status').textContent = "OK — graphique chargé depuis /versailles";
    }
  </script>
</body>
</html>
